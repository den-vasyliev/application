# Default values for app-controller.

image:
  repository: europe-docker.pkg.dev/gfk-eco-shared-blue/sre/application
  tag: ""            # empty → "v" + Chart.appVersion (the ko-published tag, e.g. v1.4.0)
  pullPolicy: IfNotPresent

replicaCount: 1

nameOverride: ""
fullnameOverride: ""

# Namespace the controller's cache is restricted to. Empty = cluster-wide.
namespace: ""

# Log verbosity (zap --zap-log-level): "info" (default), "debug", or a number.
# Set to "1" or "debug" to trace every pushed Application delta + Kubernetes event.
logLevel: ""

# Resync period in seconds for the reconcile loop.
syncPeriod: 120
# Seconds to wait before transitioning an Application to Ready (anti-flap).
stabilizationPeriod: 30

# Leader election. Only needed when running more than one replica.
leaderElection:
  enabled: false

# Metrics server. Disabled by default — no rbac-proxy sidecar is shipped; when
# enabled, use controller-runtime's built-in secure metrics or scrape the plain
# endpoint from a trusted network.
metrics:
  enabled: false
  # Address the metrics endpoint binds to when enabled. "0" disables.
  bindAddress: "127.0.0.1:8080"

# Push mode: stream Applications + Kubernetes Warning events to a triage agent
# over an outbound WebSocket (ADR-0005). Off by default.
push:
  enabled: false
  # Triage agent WebSocket URL (wss://host/v1/cluster-agent/ws).
  endpoint: ""
  # Cluster identifier stamped into pushed events (triage source segment). Also the
  # key selecting this cluster's HMAC signing key on the triage receiver.
  clusterName: ""
  # Tenant this cluster belongs to; selects the triage service graph. Declared in the
  # signed handshake (cryptographically bound by the per-cluster HMAC signature).
  tenant: ""
  # Comma-separated namespaces to push. Empty pushes all namespaces.
  namespaces: ""
  # Heartbeat interval in seconds.
  heartbeatSeconds: 20
  # Skip TLS certificate verification for a wss:// endpoint (dev only).
  insecureSkipVerify: false
  # Allow a plaintext ws:// endpoint (sends the bearer token unencrypted).
  # Leave false in production; the endpoint should be wss://.
  allowPlaintext: false
  # Per-cluster HMAC signing key for the handshake (NOT a bearer token — it is never
  # sent on the wire; the agent signs the hello with it). Provide EITHER an
  # existingSecret (with a 'token' key) OR an inline value (rendered into a Secret).
  # existingSecret wins.
  existingSecret: ""
  token: ""

# Log-based metrics (ADR-0006): scrape a Fluent Bit DaemonSet's Prometheus exporter,
# aggregate error/warn/total log-line counters per (namespace, service), and forward
# services whose error delta crosses errorThreshold as log_metrics frames over the
# push WebSocket above. Off by default. Requires push.enabled=true (there is nowhere
# else to send the frames); the chart fails the render otherwise.
#
# fluentbit.* below deploys the DaemonSet that produces these metrics. It is
# independent of this block so a fleet can run its own Fluent Bit and just point
# logMetrics.serviceName/port at it instead.
logMetrics:
  enabled: false
  # Name of the Service fronting the Fluent Bit DaemonSet's prometheus_exporter pods.
  # Looked up in the release namespace via its Endpoints. Empty = "triage-fluentbit",
  # the fixed-name Service this chart's own fluentbit.* templates create (fixed, not
  # release-prefixed, so this default holds for any release name).
  serviceName: ""
  # Fluent Bit prometheus_exporter port on each pod.
  port: 2021
  # Scrape + gate-evaluation interval in seconds.
  intervalSeconds: 60
  # Minimum error-count delta in one interval for a service to be reported.
  errorThreshold: 10
  # Prometheus counter family names as emitted by Fluent Bit's log_to_metrics filter
  # (metric_namespace "log_metric" + metric_mode "counter" produces the
  # log_metric_counter_<metric_name> family name — see fluentbit.pipeline.* below,
  # which must emit metric_name: log_errors_total / log_warns_total / log_lines_total
  # to match these defaults). warnMetric/totalMetric empty disables that counter.
  errorMetric: "log_metric_counter_log_errors_total"
  warnMetric: "log_metric_counter_log_warns_total"
  totalMetric: "log_metric_counter_log_lines_total"
  # Prometheus label keys identifying the source namespace/service on each sample.
  namespaceLabel: "namespace"
  serviceLabel: "service"
  # Second label consulted when serviceLabel is absent on a sample (see
  # fluentbit.pipeline.serviceLabelFallback below). Empty disables the fallback.
  serviceLabelFallback: "service_fallback"

# Fluent Bit DaemonSet: tails container logs, counts error/warn lines per
# (namespace, service) via the log_to_metrics filter, and exposes them for
# logMetrics.* above to scrape. Named "triage-fluentbit" (not "fluentbit") to avoid
# any collision with GKE's built-in fluentbit-gke DaemonSet. Off by default —
# independent toggle from logMetrics.enabled so a fleet can supply its own Fluent
# Bit and only enable logMetrics.
fluentbit:
  enabled: false
  image:
    repository: fluent/fluent-bit
    tag: "5.0.9"
    pullPolicy: IfNotPresent
  # Exporter port (must match logMetrics.port above if logMetrics reads this
  # DaemonSet's Service).
  port: 2021
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 100m
      memory: 128Mi
  # Namespaces the tail input's kubernetes filter enrichment should ignore (their log
  # lines are still tailed — filtering happens in the kubernetes filter's exclusion —
  # but no error/warn/total counters are produced for them).
  # Allowlist: when non-empty, tail ONLY these namespaces (excludeNamespaces is
  # then ignored — nothing else is read). Empty = tail all minus excludes.
  includeNamespaces: []
  excludeNamespaces:
    - kube-system
    - kube-node-lease
    - kube-public
  tolerations:
    - operator: Exists
  # Scope the DaemonSet to a node subset (e.g. one pilot node). Empty = all nodes.
  # Note: log collection is per-node — pods on unselected nodes are invisible.
  nodeSelector: {}
  pipeline:
    # Regex (Fluent Bit / Onigmo syntax) matched against the merged log record's
    # `log` field to classify a line as an error or a warn. Defaults cover common
    # structured and unstructured shapes.
    errorRegex: 'level=(error|fatal)|"level":"(error|fatal)"|\bERROR\b|\bFATAL\b|panic:'
    warnRegex: 'level=warn(ing)?|"level":"warn(ing)?"|\bWARN(ING)?\b'
    # Pod label read as the service identity, with a fallback label if the primary is
    # absent. Fluent Bit's kubernetes filter replaces "/" with "." in label keys, so
    # "app.kubernetes.io/name" is looked up as "app.kubernetes.io.name" on the record.
    serviceLabel: "app.kubernetes.io/name"
    serviceLabelFallback: "app"

serviceAccount:
  # Create a dedicated ServiceAccount + RBAC. When false, uses `name`.
  create: true
  name: ""

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

nodeSelector: {}
tolerations: []
affinity: {}
podAnnotations: {}
