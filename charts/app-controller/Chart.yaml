apiVersion: v2
name: app-controller
description: |
  The Kubernetes Application controller (app.k8s.io/v1beta1). Groups related
  workloads into an Application and aggregates their health. Optionally pushes
  Application inventory + Kubernetes Warning events to a triage agent over an
  outbound WebSocket for clusters with no inbound API access (push mode, ADR-0005).
type: application
version: 0.1.0
appVersion: "1.4.5"
keywords:
  - application
  - controller
  - app.k8s.io
  - triage
  - push
home: https://github.com/niq-enterprise/symbio-application-controller
sources:
  - https://github.com/niq-enterprise/symbio-application-controller
maintainers:
  - name: den-vasyliev
