{{- if and .Values.push.enabled (not .Values.push.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "app-controller.pushSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "push.token or push.existingSecret is required when push.enabled" .Values.push.token | quote }}
{{- end }}
