{{- if .Values.fluentbit.enabled }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "app-controller.fullname" . }}-fluentbit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "app-controller.fullname" . }}-fluentbit
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
rules:
  # The kubernetes filter looks up pod + namespace metadata (labels/annotations) to
  # enrich records with the labels add_label reads in the pipeline ConfigMap.
  - apiGroups: [""]
    resources: ["namespaces", "pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "app-controller.fullname" . }}-fluentbit
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "app-controller.fullname" . }}-fluentbit
subjects:
  - kind: ServiceAccount
    name: {{ include "app-controller.fullname" . }}-fluentbit
    namespace: {{ .Release.Namespace }}
---
apiVersion: v1
kind: Service
metadata:
  # Fixed name "triage-fluentbit" (not templated off the release name) so
  # logMetrics.serviceName's default matches regardless of the Helm release name —
  # the collector's Endpoints lookup targets this Service directly.
  name: triage-fluentbit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
spec:
  clusterIP: None # headless: the collector reads Endpoints directly, no VIP needed
  selector:
    {{- include "app-controller.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
  ports:
    - name: metrics
      port: {{ .Values.fluentbit.port }}
      targetPort: {{ .Values.fluentbit.port }}
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "app-controller.fullname" . }}-fluentbit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: fluentbit
spec:
  selector:
    matchLabels:
      {{- include "app-controller.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: fluentbit
  template:
    metadata:
      labels:
        {{- include "app-controller.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: fluentbit
      annotations:
        # Force a rollout when the pipeline ConfigMap changes.
        checksum/config: {{ include (print $.Template.BasePath "/fluentbit-configmap.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "app-controller.fullname" . }}-fluentbit
      tolerations:
        {{- toYaml .Values.fluentbit.tolerations | nindent 8 }}
      {{- with .Values.fluentbit.nodeSelector }}
      # Scope log collection to a node subset (e.g. a pilot node) — a DaemonSet
      # only sees its own node's /var/log, so this trades coverage for footprint.
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: fluent-bit
          image: "{{ .Values.fluentbit.image.repository }}:{{ .Values.fluentbit.image.tag }}"
          imagePullPolicy: {{ .Values.fluentbit.image.pullPolicy }}
          ports:
            - name: metrics
              containerPort: {{ .Values.fluentbit.port }}
              protocol: TCP
          resources:
            {{- toYaml .Values.fluentbit.resources | nindent 12 }}
          volumeMounts:
            - name: config
              mountPath: /fluent-bit/etc/
              readOnly: true
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibdockercontainers
              mountPath: /var/lib/docker/containers
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: {{ include "app-controller.fullname" . }}-fluentbit
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibdockercontainers
          hostPath:
            path: /var/lib/docker/containers
{{- end }}
