{{- if .Values.fluentbit.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "app-controller.fullname" . }}-fluentbit
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
data:
  fluent-bit.conf: |
    [SERVICE]
        Flush           1
        Log_Level       info
        Daemon          off
        Parsers_File    parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020

    # Tail every container log on the node. multiline.parser cri reassembles
    # lines a container runtime (containerd/CRI-O) split across multiple
    # underlying log lines, so log_to_metrics sees one record per real message.
    [INPUT]
        Name              tail
        {{- if .Values.fluentbit.includeNamespaces }}
        {{- /* Allowlist mode: tail only the named namespaces' logs. Excludes are
               irrelevant here — nothing outside the list is read at all. */}}
        Path              {{ range $i, $ns := .Values.fluentbit.includeNamespaces }}{{ if $i }},{{ end }}/var/log/containers/*_{{ $ns }}_*.log{{ end }}
        {{- else }}
        Path              /var/log/containers/*.log
        {{- with .Values.fluentbit.excludeNamespaces }}
        Exclude_Path      {{ range $i, $ns := . }}{{ if $i }},{{ end }}/var/log/containers/*_{{ $ns }}_*.log{{ end }}
        {{- end }}
        {{- end }}
        multiline.parser  cri
        Tag               kube.*
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10

    # Enrich with pod namespace + labels so add_label below can read
    # $kubernetes['labels'][...]. merge_log off: log_to_metrics only needs the raw
    # `log` field for its regex match, not a parsed JSON body.
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           Off
        Labels              On
        Annotations         Off
        Buffer_Size         512k

    # Error counter: one series per (namespace, service), incremented for every
    # record whose `log` field matches errorRegex. metric_namespace defaults to
    # "log_metric" and metric_mode "counter", so the exported family name is
    # log_metric_counter_log_errors_total (see logMetrics.errorMetric default).
    [FILTER]
        Name                 log_to_metrics
        Match                kube.*
        Tag                  triage_log_metrics
        Metric_Mode          counter
        Metric_Name          log_errors_total
        Metric_Description   Error-level log lines observed per service
        Regex                log {{ .Values.fluentbit.pipeline.errorRegex }}
        Add_Label            namespace $kubernetes['namespace_name']
        Add_Label            service $kubernetes['labels']['{{ .Values.fluentbit.pipeline.serviceLabel | replace "/" "." }}']
        Add_Label            service_fallback $kubernetes['labels']['{{ .Values.fluentbit.pipeline.serviceLabelFallback }}']

    # Warn counter: same shape, warnRegex.
    [FILTER]
        Name                 log_to_metrics
        Match                kube.*
        Tag                  triage_log_metrics
        Metric_Mode          counter
        Metric_Name          log_warns_total
        Metric_Description   Warn-level log lines observed per service
        Regex                log {{ .Values.fluentbit.pipeline.warnRegex }}
        Add_Label            namespace $kubernetes['namespace_name']
        Add_Label            service $kubernetes['labels']['{{ .Values.fluentbit.pipeline.serviceLabel | replace "/" "." }}']
        Add_Label            service_fallback $kubernetes['labels']['{{ .Values.fluentbit.pipeline.serviceLabelFallback }}']

    # Unconditional total-lines counter (every record that reaches this filter,
    # no Regex — matches all). Used for errorCount/totalCount ratio context on
    # the triage side; optional (logMetrics.totalMetric="" disables reading it).
    [FILTER]
        Name                 log_to_metrics
        Match                kube.*
        Tag                  triage_log_metrics
        Metric_Mode          counter
        Metric_Name          log_lines_total
        Metric_Description   All log lines observed per service
        Add_Label            namespace $kubernetes['namespace_name']
        Add_Label            service $kubernetes['labels']['{{ .Values.fluentbit.pipeline.serviceLabel | replace "/" "." }}']
        Add_Label            service_fallback $kubernetes['labels']['{{ .Values.fluentbit.pipeline.serviceLabelFallback }}']

    [OUTPUT]
        Name    prometheus_exporter
        Match   triage_log_metrics
        Host    0.0.0.0
        Port    {{ .Values.fluentbit.port }}

  parsers.conf: |
    # Intentionally empty: multiline.parser cri (built-in) and the kubernetes
    # filter's own tag-based parsing cover this pipeline's needs; no custom
    # parser definitions are required. Kept as a file (rather than omitting
    # Parsers_File) so a values override can add custom parsers later without
    # having to also add the SERVICE-section reference.
{{- end }}
