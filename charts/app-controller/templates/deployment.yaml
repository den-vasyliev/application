{{- if and .Values.logMetrics.enabled (not .Values.push.enabled) }}
{{- fail "logMetrics.enabled requires push.enabled=true — log_metrics frames are sent over the push WebSocket; there is nowhere to send them otherwise" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "app-controller.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "app-controller.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "app-controller.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "app-controller.selectorLabels" . | nindent 8 }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "app-controller.serviceAccountName" . }}
      terminationGracePeriodSeconds: 10
      containers:
        - name: app-controller
          image: {{ include "app-controller.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            {{- if .Values.metrics.enabled }}
            - --metrics-addr={{ .Values.metrics.bindAddress }}
            {{- else }}
            - --metrics-addr=0
            {{- end }}
            {{- if .Values.namespace }}
            - --namespace={{ .Values.namespace }}
            {{- end }}
            - --sync-period={{ .Values.syncPeriod }}
            - --stabilization-period={{ .Values.stabilizationPeriod }}
            {{- if .Values.logLevel }}
            - --zap-log-level={{ .Values.logLevel }}
            {{- end }}
            {{- if .Values.leaderElection.enabled }}
            - --enable-leader-election
            {{- end }}
            {{- if .Values.push.enabled }}
            - --push-endpoint={{ required "push.endpoint is required when push.enabled" .Values.push.endpoint }}
            - --cluster-name={{ required "push.clusterName is required when push.enabled" .Values.push.clusterName }}
            - --tenant={{ required "push.tenant is required when push.enabled" .Values.push.tenant }}
            - --push-token-file=/etc/push/token
            {{- if .Values.push.namespaces }}
            - --push-namespaces={{ .Values.push.namespaces }}
            {{- end }}
            - --push-heartbeat={{ .Values.push.heartbeatSeconds }}
            {{- if .Values.push.insecureSkipVerify }}
            - --push-insecure-skip-verify
            {{- end }}
            {{- if .Values.push.allowPlaintext }}
            - --push-allow-plaintext
            {{- end }}
            {{- end }}
            {{- if .Values.logMetrics.enabled }}
            - --log-metrics-enabled
            - --log-metrics-service-namespace={{ .Release.Namespace }}
            - --log-metrics-service-name={{ .Values.logMetrics.serviceName | default (printf "%s-fluentbit" (include "app-controller.fullname" .)) }}
            - --log-metrics-port={{ .Values.logMetrics.port }}
            - --log-metrics-interval-seconds={{ .Values.logMetrics.intervalSeconds }}
            - --log-metrics-error-threshold={{ .Values.logMetrics.errorThreshold }}
            {{- if .Values.logMetrics.errorMetric }}
            - --log-metrics-error-metric={{ .Values.logMetrics.errorMetric }}
            {{- end }}
            {{- if .Values.logMetrics.warnMetric }}
            - --log-metrics-warn-metric={{ .Values.logMetrics.warnMetric }}
            {{- end }}
            {{- if .Values.logMetrics.totalMetric }}
            - --log-metrics-total-metric={{ .Values.logMetrics.totalMetric }}
            {{- end }}
            {{- if .Values.logMetrics.namespaceLabel }}
            - --log-metrics-namespace-label={{ .Values.logMetrics.namespaceLabel }}
            {{- end }}
            {{- if .Values.logMetrics.serviceLabel }}
            - --log-metrics-service-label={{ .Values.logMetrics.serviceLabel }}
            {{- end }}
            - --log-metrics-service-label-fallback={{ .Values.logMetrics.serviceLabelFallback }}
            {{- end }}
          {{- if .Values.push.enabled }}
          volumeMounts:
            - name: push-token
              mountPath: /etc/push
              readOnly: true
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- if .Values.push.enabled }}
      volumes:
        - name: push-token
          secret:
            secretName: {{ include "app-controller.pushSecretName" . }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
