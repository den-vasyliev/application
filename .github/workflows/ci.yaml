name: CI

on:
  push:
    branches: ["main"]
    tags: ["v*"]
  pull_request:
    branches: ["main"]

permissions:
  contents: write
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

  image:
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - uses: ko-build/setup-ko@v0.7

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        env:
          KO_DOCKER_REPO: ghcr.io/${{ github.repository }}
        run: |
          TAGS=$(git rev-parse --short HEAD)
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
            MAJOR_MINOR="${VERSION%.*}"
            MAJOR="${MAJOR_MINOR%.*}"
            TAGS="$TAGS,$VERSION,$MAJOR_MINOR,$MAJOR"
          fi
          if [[ "${{ github.ref_name }}" == "${{ github.event.repository.default_branch }}" ]]; then
            TAGS="$TAGS,latest"
          fi
          ko build \
            --tags="$TAGS" \
            --bare \
            --platform=linux/amd64,linux/arm64 \
            --image-label org.opencontainers.image.revision=$(git rev-parse HEAD) \
            --image-label org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }} \
            .
